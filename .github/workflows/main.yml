name: Pipeline Integration Continue - Redmine

on:
  push:
    branches: [ main ]

jobs:
  run-redmine-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Étape 1 - Récupérer le code source
        uses: actions/checkout@v4

      - name: Étape 2 - Installer Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Étape 3 - Installer les dépendances (Requirements)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Étape 4 modifiée : Injection sécurisée des secrets GitHub dans l'environnement du serveur
      - name: Étape 4 - Exécuter le test de connexion
        env:
          APP_URL: ${{ secrets.APP_URL }}
          APP_USERNAME: ${{ secrets.APP_USERNAME }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: |
          pytest tests/test_connexion.py --html=rapport_execution.html --self-contained-html

      # NOUVELLE ÉTAPE 5 : Extraction et persistance du rapport HTML
      - name: Étape 5 - Sauvegarder le rapport de test HTML
        if: always() # Condition QA cruciale : extrait le rapport même si le test à l'étape 4 échoue
        uses: actions/upload-artifact@v4
        with:
          name: rapport-qa-redmine
          path: rapport_execution.html