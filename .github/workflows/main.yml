name: Pipeline Integration Continue - Redmine

on:
  push:
    branches: [ main ]

jobs:
  run-redmine-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Étape 1 - Récupérer le code source
        uses: actions/checkout@v4

      - name: Étape 2 - Installer Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Étape 3 - Installer les dépendances (Requirements)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Étape 4 - Exécuter le test de connexion Redmine
        run: |
          pytest tests/test_connexion.py

